name: Build AppImage

on:
  workflow_dispatch:
    inputs:
      tag:
        description: ""
        required: true
        type: string
      prerelease:
        description: ""
        required: false
        type: boolean
        default: false
permissions:
  contents: write

jobs:
  appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            libjavascriptcoregtk-4.1-dev \
            libnm-dev \
            xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Sync version
        run: npm run sync-version

      - name: Build AppImage
        run: |
          npx tauri build --ci --bundles appimage --no-sign --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-tools-appimage
          if-no-files-found: error
          path: target/release/bundle/appimage/*.AppImage

      - name: Create or update GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          APPIMAGE_PATH="$(find target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' -print -quit)"

          if [ -z "$APPIMAGE_PATH" ]; then
            echo "No AppImage found"
            exit 1
          fi

          RELEASE_FLAGS=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            RELEASE_FLAGS="--prerelease"
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists, uploading asset..."
            gh release upload "$TAG_NAME" "$APPIMAGE_PATH" --clobber
          else
            echo "Creating release $TAG_NAME..."
            gh release create "$TAG_NAME" \
              "$APPIMAGE_PATH" \
              --target "$GITHUB_SHA" \
              --latest \
              --generate-notes \
              $RELEASE_FLAGS
          fi
